<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>婚禮報到系統 · 吳宇童 ❤ 劉懷筑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#FBF7F2; --paper:#FFFFFF; --wine:#7E2A3D; --wine-deep:#5E1E2D;
  --gold:#C2A05C; --gold-soft:#E6D5AE; --ink:#3A2C2A; --muted:#9A887F;
  --line:#EBE1D6; --green:#4F8A6B; --green-soft:#E5F0E9; --red:#C0563F;
  --red-soft:#FBEAE5; --dark:#2A1620; --dark2:#3A2230;
  --shadow:0 8px 30px rgba(94,30,45,.10); --shadow-sm:0 2px 10px rgba(94,30,45,.06);
  --r:16px; --r-sm:11px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"Noto Sans TC",sans-serif; color:var(--ink);
  background:var(--ivory); line-height:1.55; -webkit-font-smoothing:antialiased;
  padding-bottom:78px;
}
.serif{font-family:"Noto Serif TC",serif}
.script{font-family:"Cormorant Garamond",serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
h1,h2,h3,h4{margin:0;font-weight:600}
.hidden{display:none!important}

/* ---------- top header ---------- */
header.app{
  background:linear-gradient(135deg,var(--wine) 0%,var(--wine-deep) 100%);
  color:#fff; padding:14px 18px 13px; position:relative; overflow:hidden;
}
header.app::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 88% -10%,rgba(226,213,174,.22),transparent 45%);
  pointer-events:none;
}
.hd-row{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative}
.hd-names{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.hd-heart{color:var(--gold-soft);font-size:14px}
.hd-sub{font-size:11px;color:rgba(255,255,255,.62);letter-spacing:1.5px;margin-top:2px}
.mode-chip{
  font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;
  border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.mode-dot{width:7px;height:7px;border-radius:50%;background:var(--gold-soft)}
.mode-chip.cloud .mode-dot{background:#7ED9A8;box-shadow:0 0 0 3px rgba(126,217,168,.25)}

/* ---------- bottom nav ---------- */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:rgba(255,255,255,.94);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);display:flex;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav.tabs button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 2px;color:var(--muted);font-size:10.5px;border-radius:12px;transition:.18s;
}
nav.tabs button .ic{font-size:21px;line-height:1}
nav.tabs button.active{color:var(--wine)}
nav.tabs button.active .ic{transform:translateY(-1px)}

/* ---------- layout ---------- */
main{max-width:760px;margin:0 auto;padding:16px 14px 24px}
.view{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-title{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px;margin:2px 0 14px}
.section-title .eyebrow{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:14px;color:var(--gold);font-weight:500}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.pad{padding:16px}

/* ---------- dashboard ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:14px}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.stat .num{font-family:"Cormorant Garamond",serif;font-size:42px;font-weight:600;line-height:1;color:var(--wine)}
.stat .lbl{font-size:12px;color:var(--muted);margin-top:5px;letter-spacing:.5px}
.stat.gold .num{color:var(--gold)}
.stat.green .num{color:var(--green)}
.stat .corner{position:absolute;top:11px;right:13px;font-size:18px;opacity:.5}

.progress-card{margin-bottom:14px;padding:18px}
.progress-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px}
.progress-head .big{font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:600;color:var(--wine)}
.progress-head .big small{font-size:16px;color:var(--muted)}
.bar{height:12px;background:var(--ivory);border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--wine));border-radius:10px;transition:width .6s cubic-bezier(.2,.8,.2,1)}

.gift-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;margin-bottom:14px;
  background:linear-gradient(135deg,#fff,#FCF6EC);border:1px solid var(--gold-soft);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.gift-amt{font-family:"Cormorant Garamond",serif;font-size:34px;font-weight:600;color:var(--gold);letter-spacing:.5px}
.eye-btn{padding:8px 14px;border-radius:20px;background:var(--ivory);border:1px solid var(--line);font-size:13px;color:var(--ink);display:flex;align-items:center;gap:6px}

.feed-item{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);animation:slidein .4s ease}
.feed-item:last-child{border-bottom:none}
@keyframes slidein{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.feed-ava{width:38px;height:38px;border-radius:50%;background:var(--wine);color:#fff;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif TC",serif;font-size:16px;flex-shrink:0}
.feed-name{font-weight:500}
.feed-meta{font-size:12px;color:var(--muted)}
.feed-time{margin-left:auto;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

/* table status grid (dashboard) */
.tbl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:9px}
.tbl-mini{border:1px solid var(--line);border-radius:var(--r-sm);padding:10px;background:var(--paper)}
.tbl-mini .tn{font-weight:600;font-size:13px;margin-bottom:3px}
.tbl-mini .frac{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:600;color:var(--wine);line-height:1}
.tbl-mini .frac small{font-size:13px;color:var(--muted)}
.tbl-mini .mbar{height:5px;background:var(--ivory);border-radius:4px;margin-top:7px;overflow:hidden}
.tbl-mini .mbar>span{display:block;height:100%;background:var(--green);border-radius:4px}

/* ---------- check-in ---------- */
.searchbar{position:relative;margin-bottom:12px}
.searchbar input{width:100%;padding:13px 14px 13px 42px;border:1px solid var(--line);border-radius:var(--r);background:var(--paper);font-size:16px;outline:none;transition:.18s}
.searchbar input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,160,92,.15)}
.searchbar .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.5}
.filter-row{display:flex;gap:7px;margin-bottom:13px;overflow-x:auto;padding-bottom:2px}
.chip{padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--paper);font-size:13px;color:var(--muted);white-space:nowrap;transition:.16s}
.chip.on{background:var(--wine);color:#fff;border-color:var(--wine)}
.chip .b{font-weight:600;margin-left:3px}

.g-card{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:9px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);transition:.16s;position:relative;overflow:hidden}
.g-card:active{transform:scale(.99)}
.g-card.done{background:#FAFCFB;border-color:var(--green-soft)}
.g-card.done::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
.g-tbl{width:46px;height:46px;border-radius:12px;background:var(--ivory);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;line-height:1.1}
.g-tbl .t-num{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:600;color:var(--wine)}
.g-tbl .t-lbl{font-size:9px;color:var(--muted)}
.g-info{flex:1;min-width:0}
.g-name{font-weight:500;font-size:16px;display:flex;align-items:center;gap:7px}
.g-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--ivory);color:var(--muted)}
.tag.cookie{background:#FCEFE0;color:#B07A2E}
.tag.side{background:#F0E9F2;color:#7A5A82}
.g-right{text-align:right;flex-shrink:0}
.g-status{font-size:12px;color:var(--muted)}
.g-status.ok{color:var(--green);font-weight:500}
.g-gift{font-family:"Cormorant Garamond",serif;font-weight:600;color:var(--gold);font-size:17px}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(42,22,32,.5);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:ovf .2s ease}
@keyframes ovf{from{opacity:0}to{opacity:1}}
.sheet{background:var(--paper);width:100%;max-width:560px;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;animation:sheetup .28s cubic-bezier(.2,.9,.3,1);padding-bottom:env(safe-area-inset-bottom)}
@keyframes sheetup{from{transform:translateY(100%)}to{transform:none}}
.sheet-grab{width:40px;height:4px;background:var(--line);border-radius:3px;margin:10px auto 4px}
.sheet-pad{padding:8px 20px 22px}
.sheet-head{text-align:center;padding:8px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
.sheet-head .nm{font-family:"Noto Serif TC",serif;font-size:24px;font-weight:600}
.sheet-head .meta{font-size:13px;color:var(--muted);margin-top:5px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.cookie-banner{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;margin-bottom:16px;font-weight:500}
.cookie-banner.need{background:linear-gradient(135deg,#FCEFE0,#FBE3CB);color:#A8691F;border:1px solid #EBC79A}
.cookie-banner.no{background:var(--ivory);color:var(--muted);border:1px solid var(--line)}
.cookie-banner .cb-ic{font-size:26px}
.cookie-banner .cb-t{flex:1}
.cookie-banner .cb-t b{font-size:16px;display:block}
.cookie-banner .cb-t span{font-size:12px;opacity:.85}
.toggle{position:relative;width:50px;height:29px;border-radius:20px;background:var(--line);transition:.2s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:23px;height:23px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(21px)}

.field-lbl{font-size:13px;color:var(--muted);margin:14px 0 7px;font-weight:500}
.gift-input{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:14px;padding:6px 14px;background:var(--paper)}
.gift-input:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,160,92,.15)}
.gift-input .ntd{font-family:"Noto Serif TC",serif;font-size:20px;color:var(--muted);margin-right:6px}
.gift-input input{border:none;outline:none;flex:1;font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:600;color:var(--wine);background:transparent;width:100%}
.quick-amt{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.quick-amt button{padding:8px 13px;border-radius:20px;border:1px solid var(--line);background:var(--paper);font-size:14px;color:var(--ink);transition:.14s}
.quick-amt button:active{background:var(--gold-soft);border-color:var(--gold)}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:500;transition:.16s}
.btn-primary{background:var(--wine);color:#fff;box-shadow:0 6px 18px rgba(126,42,61,.28)}
.btn-primary:active{transform:scale(.98)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 6px 18px rgba(79,138,107,.28)}
.btn-ghost{background:var(--ivory);color:var(--muted);border:1px solid var(--line)}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row .btn{flex:1}
.btn-sm{padding:9px 14px;font-size:13px;border-radius:10px;width:auto}

/* ---------- seating ---------- */
.seat-head{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.unassigned-pool{background:linear-gradient(135deg,#FFF,#FCF6EC);border:1px dashed var(--gold);border-radius:var(--r);padding:13px;margin-bottom:16px}
.pool-title{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.pool-chips{display:flex;flex-wrap:wrap;gap:7px}
.guest-pill{padding:7px 11px;border-radius:20px;background:var(--paper);border:1px solid var(--line);font-size:13px;display:flex;align-items:center;gap:6px;cursor:grab}
.guest-pill.dragging{opacity:.4}
.guest-pill .ps{font-size:11px;color:var(--muted)}
.seat-table{margin-bottom:12px;border:1px solid var(--line);border-radius:var(--r);background:var(--paper);overflow:hidden;box-shadow:var(--shadow-sm)}
.seat-table.over{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,160,92,.2)}
.st-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(135deg,var(--wine),var(--wine-deep));color:#fff}
.st-head .tn{font-family:"Noto Serif TC",serif;font-weight:600;font-size:16px;flex:1}
.st-head .cap{font-size:12px;background:rgba(255,255,255,.18);padding:3px 9px;border-radius:14px}
.st-head .cap.full{background:var(--red)}
.st-body{padding:11px 14px;display:flex;flex-wrap:wrap;gap:7px;min-height:42px}
.st-empty{color:var(--muted);font-size:13px;padding:4px}
.seat-pill{padding:6px 10px;border-radius:18px;background:var(--ivory);border:1px solid var(--line);font-size:13px;display:flex;align-items:center;gap:6px}
.seat-pill.arr{background:var(--green-soft);border-color:#C9E4D5}
.seat-pill .x{color:var(--muted);font-weight:600;cursor:pointer;font-size:15px;line-height:1}

/* ---------- guests admin ---------- */
.adm-row{display:flex;align-items:center;gap:11px;padding:12px 13px;border-bottom:1px solid var(--line)}
.adm-row:last-child{border-bottom:none}
.adm-tnum{width:34px;height:34px;border-radius:9px;background:var(--ivory);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-weight:600;color:var(--wine);flex-shrink:0;border:1px solid var(--line)}
.adm-info{flex:1;min-width:0}
.adm-name{font-weight:500}
.adm-sub{font-size:12px;color:var(--muted);display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
.icon-btn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--ivory);border:1px solid var(--line);font-size:15px;flex-shrink:0}

select.inp,input.inp,textarea.inp{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:var(--paper);outline:none;transition:.16s}
select.inp:focus,input.inp:focus,textarea.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,160,92,.15)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;background:var(--ivory);border-radius:11px;padding:3px;border:1px solid var(--line)}
.seg button{flex:1;padding:9px;border-radius:8px;font-size:14px;color:var(--muted);transition:.14s}
.seg button.on{background:var(--paper);color:var(--ink);font-weight:500;box-shadow:var(--shadow-sm)}

.fab{position:fixed;right:18px;bottom:90px;width:56px;height:56px;border-radius:50%;background:var(--wine);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(126,42,61,.4);z-index:55}

/* ---------- lottery ---------- */
.lot-wrap{text-align:center}
.lot-stage{background:linear-gradient(160deg,var(--dark),var(--dark2));border-radius:22px;padding:34px 20px 30px;margin:6px 0 16px;position:relative;overflow:hidden;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.lot-stage::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 12%,rgba(226,213,174,.18),transparent 55%)}
.lot-prize{color:var(--gold-soft);font-size:14px;letter-spacing:3px;margin-bottom:14px;position:relative;font-weight:500}
.lot-name{font-family:"Noto Serif TC",serif;font-size:48px;font-weight:600;color:#fff;position:relative;min-height:60px;display:flex;align-items:center;justify-content:center;text-shadow:0 2px 20px rgba(226,213,174,.3)}
.lot-name.rolling{color:var(--gold-soft);opacity:.8}
.lot-sub{color:rgba(255,255,255,.55);font-size:13px;margin-top:8px;position:relative;min-height:18px}
.lot-confetti{position:absolute;inset:0;pointer-events:none}
.winners-list{margin-top:6px}
.win-item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--paper);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.win-medal{font-size:20px}
.win-prize{font-size:12px;color:var(--gold);font-weight:500}
.win-name{font-weight:500}

/* fullscreen projection */
.proj{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,var(--dark),#1a0e14);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.proj .pj-names{position:absolute;top:30px;font-family:"Cormorant Garamond",serif;font-style:italic;color:var(--gold-soft);font-size:22px;letter-spacing:2px}
.proj .pj-prize{color:var(--gold-soft);font-size:clamp(18px,3vw,28px);letter-spacing:5px;margin-bottom:24px}
.proj .pj-name{font-family:"Noto Serif TC",serif;font-weight:600;color:#fff;font-size:clamp(60px,13vw,160px);line-height:1;text-shadow:0 4px 40px rgba(226,213,174,.4)}
.proj .pj-name.rolling{color:var(--gold-soft);opacity:.85}
.proj .pj-sub{color:rgba(255,255,255,.5);font-size:clamp(14px,2vw,20px);margin-top:20px;min-height:24px}
.proj .pj-close{position:absolute;top:24px;right:28px;color:rgba(255,255,255,.6);font-size:30px}
.proj .pj-controls{position:absolute;bottom:34px;display:flex;gap:14px}
.proj .pj-btn{padding:15px 34px;border-radius:40px;font-size:18px;font-weight:500;background:var(--gold);color:var(--dark);box-shadow:0 8px 30px rgba(194,160,92,.4)}
.proj .pj-btn.ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}

/* settings */
.set-block{margin-bottom:14px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted)}
.code-box{background:var(--dark);color:#E8DCC8;font-family:ui-monospace,Menlo,monospace;font-size:12px;border-radius:11px;padding:13px;overflow-x:auto;white-space:pre;line-height:1.5;margin-top:8px}
.note{font-size:12.5px;color:var(--muted);line-height:1.7;background:var(--ivory);border-radius:11px;padding:12px 13px;border:1px solid var(--line)}

.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .e-ic{font-size:40px;opacity:.4;margin-bottom:10px}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;z-index:300;opacity:0;transition:.28s;box-shadow:0 8px 28px rgba(0,0,0,.3);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:620px){ .stat-grid{grid-template-columns:repeat(4,1fr)} }
</style>
</head>
<body>

<header class="app">
  <div class="hd-row">
    <div>
      <div class="hd-names">吳宇童 <span class="hd-heart">❤</span> 劉懷筑</div>
      <div class="hd-sub" id="hdVenue">WEDDING CHECK-IN · 高雄</div>
    </div>
    <div class="mode-chip" id="modeChip"><span class="mode-dot"></span><span id="modeTxt">本機模式</span></div>
  </div>
</header>

<main id="main"></main>

<button class="fab hidden" id="fab" onclick="openGuestEdit()">＋</button>

<nav class="tabs" id="tabs">
  <button data-v="dashboard" class="active"><span class="ic">📊</span>戰況</button>
  <button data-v="checkin"><span class="ic">✅</span>報到</button>
  <button data-v="seating"><span class="ic">🪑</span>桌次</button>
  <button data-v="guests"><span class="ic">👥</span>賓客</button>
  <button data-v="lottery"><span class="ic">🎁</span>抽獎</button>
  <button data-v="settings"><span class="ic">⚙️</span>設定</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   設定區 — 填入你的 Firebase 設定即可開啟「雲端多人即時連線」
   留空則自動使用本機模式(同一台裝置、跨分頁可同步、可立即試用)
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDwayqeK4tZjNeeGyvddJ3XIsqFx9WjpNM",
  authDomain: "weddingcome.firebaseapp.com",
  databaseURL: "https://weddingcome-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "weddingcome",
  storageBucket: "weddingcome.firebasestorage.app",
  messagingSenderId: "828958406456",
  appId: "1:828958406456:web:4f6571a26baa3506dc73cd"
};
const DB_ROOT = "weddingCheckin"; // Firebase 資料根節點

/* ============================================================
   資料層:雲端 / 本機 雙模式統一介面
   ============================================================ */
const App = {
  mode: "local",
  state: { guests:{}, tables:{}, lottery:{winners:[]}, meta:{} },
  fb: null,
  bc: null,
  LS_KEY: "wedding_checkin_v1",
  listeners: [],

  cloudError: null,
  async init(){
    const valid = FIREBASE_CONFIG.databaseURL && !FIREBASE_CONFIG.databaseURL.includes("YOUR_");
    if(valid){
      try{ await this.initCloud(); this.mode="cloud"; }
      catch(e){
        this.cloudError = e && e.message ? e.message : String(e);
        console.warn("Firebase 連線失敗,改用本機模式:", this.cloudError);
        this.mode="local"; this.initLocal();
      }
    } else { this.cloudError="尚未填入 Firebase 設定"; this.mode="local"; this.initLocal(); }
    this.refreshModeUI();
  },

  /* ---- 本機模式 ---- */
  initLocal(){
    try{ const raw=localStorage.getItem(this.LS_KEY); if(raw) this.state=JSON.parse(raw); }catch(e){}
    if(!this.state.guests) this.state.guests={};
    if(!this.state.tables) this.state.tables={};
    if(!this.state.lottery) this.state.lottery={winners:[]};
    if(!this.state.meta) this.state.meta={};
    try{
      this.bc=new BroadcastChannel("wedding_checkin");
      this.bc.onmessage=(ev)=>{ this.state=ev.data; this.emit(); };
    }catch(e){}
    this.emit();
  },
  saveLocal(){
    try{ localStorage.setItem(this.LS_KEY,JSON.stringify(this.state)); }catch(e){}
    if(this.bc) this.bc.postMessage(this.state);
  },

  /* ---- 雲端模式 ---- */
  async initCloud(){
    try{
      await loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js");
      await loadScript("https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js");
    }catch(e){ throw new Error("無法載入 Firebase 程式庫(請檢查網路連線)"); }
    if(typeof firebase==="undefined") throw new Error("Firebase 程式庫載入失敗");
    firebase.initializeApp(FIREBASE_CONFIG);
    this.fb=firebase.database();
    // 等待真正連上資料庫(.info/connected 不受規則限制)
    await new Promise((resolve,reject)=>{
      let settled=false;
      const to=setTimeout(()=>{ if(!settled){ settled=true;
        reject(new Error("連線逾時 — 多半是還沒在 Firebase 建立 Realtime Database")); } }, 7000);
      this.fb.ref(".info/connected").on("value",(snap)=>{
        if(snap.val()===true && !settled){ settled=true; clearTimeout(to); resolve(); }
      });
    });
    // 訂閱資料;讀取若被規則擋下會進 error callback
    this.fb.ref(DB_ROOT).on("value",(snap)=>{
      const v=snap.val()||{};
      this.state={ guests:v.guests||{}, tables:v.tables||{}, lottery:v.lottery||{winners:[]}, meta:v.meta||{} };
      this.emit();
    },(err)=>{
      this.cloudError="資料庫拒絕讀取(請把規則設為測試模式)";
      this.refreshModeUI(); this.emit();
    });
  },

  /* ---- 寫入 ---- */
  commit(pathFn){
    pathFn(this.state);
    if(this.mode==="cloud"){ this.fb.ref(DB_ROOT).set(this.state); }
    else { this.saveLocal(); this.emit(); }
  },

  onChange(fn){ this.listeners.push(fn); },
  emit(){ this.listeners.forEach(f=>f()); },

  refreshModeUI(){
    const chip=document.getElementById("modeChip");
    const txt=document.getElementById("modeTxt");
    if(this.mode==="cloud"){ chip.classList.add("cloud"); txt.textContent="雲端連線"; }
    else { chip.classList.remove("cloud"); txt.textContent="本機模式"; }
  }
};

function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

/* ============================================================
   工具
   ============================================================ */
const $=(s,el=document)=>el.querySelector(s);
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1900);
}
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const fmtMoney=n=>"$"+Number(n||0).toLocaleString("en-US");
function nowTime(){ const d=new Date(); return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); }
function timeStr(ts){ if(!ts)return""; const d=new Date(ts); return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"); }

const guestList=()=>Object.entries(App.state.guests).map(([id,g])=>({id,...g}));
const tableList=()=>Object.entries(App.state.tables).map(([id,t])=>({id,...t})).sort((a,b)=>(a.order||0)-(b.order||0));
function tableName(id){ const t=App.state.tables[id]; return t?t.name:null; }
function guestsAtTable(id){ return guestList().filter(g=>g.table===id); }

/* ============================================================
   視圖切換
   ============================================================ */
let currentView="dashboard";
let modalEl=null;
document.querySelectorAll("#tabs button").forEach(b=>{
  b.onclick=()=>{ switchView(b.dataset.v); };
});
function switchView(v){
  currentView=v;
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active",b.dataset.v===v));
  document.getElementById("fab").classList.toggle("hidden",v!=="guests");
  render();
}
function render(){
  if(modalEl) return; // 開著彈窗時不重繪底層,避免干擾輸入
  const m=document.getElementById("main");
  const fns={dashboard:viewDashboard,checkin:viewCheckin,seating:viewSeating,guests:viewGuests,lottery:viewLottery,settings:viewSettings};
  m.innerHTML=`<div class="view">${fns[currentView]()}</div>`;
  if(currentView==="checkin") bindCheckin();
  if(currentView==="seating") bindSeating();
}
App.onChange(()=>{ if(!modalEl) render(); });

/* ============================================================
   戰況 Dashboard
   ============================================================ */
let giftVisible=false;
function viewDashboard(){
  const gs=guestList();
  const totalHeads=gs.reduce((s,g)=>s+(g.partySize||1),0);
  const arrived=gs.filter(g=>g.arrived);
  const arrivedHeads=arrived.reduce((s,g)=>s+(g.partySize||1),0);
  const pct=totalHeads?Math.round(arrivedHeads/totalHeads*100):0;
  const giftTotal=arrived.reduce((s,g)=>s+(Number(g.giftAmount)||0),0);
  const cookieNeed=gs.filter(g=>g.needsCookie).length;
  const cookieGiven=gs.filter(g=>g.needsCookie&&g.cookieGiven).length;

  const feed=arrived.filter(g=>g.arrivedTime).sort((a,b)=>b.arrivedTime-a.arrivedTime).slice(0,6);
  const tbls=tableList();

  if(gs.length===0){
    return `<h2 class="section-title"><span class="eyebrow">Live</span> 報到戰況</h2>
      ${emptyBox("🕊️","還沒有賓客名單","先到「賓客」分頁建立名單,或到「桌次」設定桌位")}`;
  }

  return `
  <h2 class="section-title"><span class="eyebrow">Live</span> 報到戰況</h2>

  <div class="progress-card card">
    <div class="progress-head">
      <div><div style="font-size:13px;color:var(--muted);letter-spacing:1px">已到場人數</div>
      <div class="big">${arrivedHeads}<small> / ${totalHeads} 人</small></div></div>
      <div class="script" style="font-size:38px;color:var(--gold);font-weight:600">${pct}%</div>
    </div>
    <div class="bar"><span style="width:${pct}%"></span></div>
  </div>

  <div class="stat-grid">
    <div class="stat green"><span class="corner">🎉</span><div class="num">${arrived.length}</div><div class="lbl">已報到桌帖</div></div>
    <div class="stat"><span class="corner">⏳</span><div class="num">${gs.length-arrived.length}</div><div class="lbl">尚未報到</div></div>
    <div class="stat gold"><span class="corner">🍪</span><div class="num">${cookieGiven}<span style="font-size:20px;color:var(--muted)">/${cookieNeed}</span></div><div class="lbl">喜餅已發 / 需發</div></div>
    <div class="stat"><span class="corner">🪑</span><div class="num">${tbls.length}</div><div class="lbl">總桌數</div></div>
  </div>

  <div class="gift-row">
    <div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:1px">禮金累計</div>
      <div class="gift-amt">${giftVisible?fmtMoney(giftTotal):"$ ••••••"}</div>
    </div>
    <button class="eye-btn" onclick="giftVisible=!giftVisible;render()">${giftVisible?"🙈 隱藏":"👁 顯示"}</button>
  </div>

  ${feed.length?`<div class="card pad" style="margin-bottom:14px">
    <h3 style="font-size:14px;margin-bottom:8px;color:var(--muted);letter-spacing:1px">最新報到</h3>
    ${feed.map(g=>`<div class="feed-item">
      <div class="feed-ava">${esc((g.name||"?").slice(0,1))}</div>
      <div><div class="feed-name">${esc(g.name)}</div>
      <div class="feed-meta">${g.table?esc(tableName(g.table)||"")+" · ":""}${g.partySize>1?g.partySize+"位 · ":""}${g.needsCookie?(g.cookieGiven?"喜餅已領":"待領喜餅"):"無喜餅"}</div></div>
      <div class="feed-time">${timeStr(g.arrivedTime)}</div>
    </div>`).join("")}
  </div>`:""}

  ${tbls.length?`<h3 class="section-title" style="font-size:16px;margin-top:18px"><span class="eyebrow">Tables</span> 各桌到場</h3>
  <div class="tbl-grid">
    ${tbls.map(t=>{
      const at=guestsAtTable(t.id);
      const ar=at.filter(g=>g.arrived).length;
      const p=at.length?Math.round(ar/at.length*100):0;
      return `<div class="tbl-mini"><div class="tn">${esc(t.name)}</div>
        <div class="frac">${ar}<small>/${at.length}</small></div>
        <div class="mbar"><span style="width:${p}%"></span></div></div>`;
    }).join("")}
  </div>`:""}
  `;
}

/* ============================================================
   報到 Check-in
   ============================================================ */
let ciSearch="", ciFilter="all";
function viewCheckin(){
  const gs=guestList();
  const arrivedN=gs.filter(g=>g.arrived).length;
  return `
  <h2 class="section-title"><span class="eyebrow">Welcome</span> 賓客報到</h2>
  <div class="searchbar"><span class="si">🔍</span>
    <input id="ciSearchInput" placeholder="搜尋賓客姓名…" value="${esc(ciSearch)}" autocomplete="off">
  </div>
  <div class="filter-row">
    <button class="chip ${ciFilter==='all'?'on':''}" data-f="all">全部<span class="b">${gs.length}</span></button>
    <button class="chip ${ciFilter==='pending'?'on':''}" data-f="pending">未報到<span class="b">${gs.length-arrivedN}</span></button>
    <button class="chip ${ciFilter==='done'?'on':''}" data-f="done">已報到<span class="b">${arrivedN}</span></button>
    <button class="chip ${ciFilter==='cookie'?'on':''}" data-f="cookie">待發喜餅<span class="b">${gs.filter(g=>g.needsCookie&&g.arrived&&!g.cookieGiven).length}</span></button>
  </div>
  <div id="ciList">${renderCiList()}</div>`;
}
function renderCiList(){
  let gs=guestList();
  const q=ciSearch.trim().toLowerCase();
  if(q) gs=gs.filter(g=>(g.name||"").toLowerCase().includes(q));
  if(ciFilter==="pending") gs=gs.filter(g=>!g.arrived);
  if(ciFilter==="done") gs=gs.filter(g=>g.arrived);
  if(ciFilter==="cookie") gs=gs.filter(g=>g.needsCookie&&g.arrived&&!g.cookieGiven);
  gs.sort((a,b)=>{
    if(!!a.arrived!==!!b.arrived) return a.arrived?1:-1;
    return (a.name||"").localeCompare(b.name||"","zh-Hant");
  });
  if(gs.length===0) return emptyBox("🔍","找不到賓客",q?`沒有符合「${esc(ciSearch)}」的賓客`:"換個篩選條件看看");
  return gs.map(g=>{
    const tn=g.table?tableName(g.table):null;
    return `<div class="g-card ${g.arrived?'done':''}" onclick="openCheckin('${g.id}')">
      <div class="g-tbl"><div class="t-num">${tn?esc(tn.replace(/[^0-9]/g,'')||tn.slice(0,2)):"—"}</div><div class="t-lbl">${tn?"桌":"未排桌"}</div></div>
      <div class="g-info">
        <div class="g-name">${esc(g.name)}${g.partySize>1?`<span class="tag">${g.partySize}位</span>`:""}</div>
        <div class="g-tags">
          ${g.side?`<span class="tag side">${esc(g.side)}</span>`:""}
          ${g.relation?`<span class="tag">${esc(g.relation)}</span>`:""}
          ${g.needsCookie?`<span class="tag cookie">🍪 ${g.cookieGiven?"已領":"需喜餅"}</span>`:""}
        </div>
      </div>
      <div class="g-right">
        ${g.arrived
          ? `<div class="g-gift">${g.giftAmount?fmtMoney(g.giftAmount):"已到"}</div><div class="g-status ok">✓ ${timeStr(g.arrivedTime)}</div>`
          : `<div class="g-status">輕觸報到</div>`}
      </div>
    </div>`;
  }).join("");
}
function bindCheckin(){
  const inp=$("#ciSearchInput");
  if(inp){
    inp.oninput=()=>{ ciSearch=inp.value; $("#ciList").innerHTML=renderCiList(); };
  }
  document.querySelectorAll(".filter-row .chip").forEach(c=>{
    c.onclick=()=>{ ciFilter=c.dataset.f; render(); setTimeout(()=>{const i=$("#ciSearchInput");if(i&&ciSearch){i.focus();}},0); };
  });
}

/* ---- 報到彈窗 ---- */
const QUICK_AMTS=[600,1200,1600,2000,2200,3600,6000,6600,12000];
function openCheckin(id){
  const g=App.state.guests[id]; if(!g)return;
  let gift=g.giftAmount||"";
  let cookieGiven=!!g.cookieGiven;
  const tn=g.table?tableName(g.table):null;

  openSheet(`
    <div class="sheet-head">
      <div class="nm">${esc(g.name)}</div>
      <div class="meta">
        ${tn?`<span>🪑 ${esc(tn)}</span>`:`<span>未排桌</span>`}
        ${g.side?`<span>${esc(g.side)}</span>`:""}
        ${g.relation?`<span>${esc(g.relation)}</span>`:""}
        ${g.partySize>1?`<span>${g.partySize} 位</span>`:""}
      </div>
    </div>

    <div class="cookie-banner ${g.needsCookie?'need':'no'}">
      <span class="cb-ic">${g.needsCookie?"🍪":"🚫"}</span>
      <div class="cb-t">
        <b>${g.needsCookie?"這位賓客要給喜餅":"這位賓客不需喜餅"}</b>
        <span>${g.needsCookie?"請於報到時交付喜餅":"報到時不必準備"}</span>
      </div>
      ${g.needsCookie?`<div class="toggle ${cookieGiven?'on':''}" id="ckTog"></div>`:""}
    </div>
    ${g.needsCookie?`<div style="text-align:center;font-size:13px;color:var(--muted);margin:-8px 0 4px" id="ckLbl">${cookieGiven?"✓ 喜餅已交付":"切換上方開關標記已交付"}</div>`:""}

    <div class="field-lbl">禮金金額</div>
    <div class="gift-input"><span class="ntd">NT$</span>
      <input id="giftIn" type="number" inputmode="numeric" placeholder="0" value="${gift}">
    </div>
    <div class="quick-amt">
      ${QUICK_AMTS.map(a=>`<button onclick="setGift(${a})">${a.toLocaleString()}</button>`).join("")}
      <button onclick="setGift(0)" style="color:var(--muted)">清除</button>
    </div>

    <div class="btn-row">
      ${g.arrived
        ? `<button class="btn btn-ghost" onclick="undoCheckin('${id}')">取消報到</button>
           <button class="btn btn-green" onclick="confirmCheckin('${id}')">💾 更新</button>`
        : `<button class="btn btn-ghost" onclick="closeSheet()">取消</button>
           <button class="btn btn-primary" onclick="confirmCheckin('${id}')">✓ 完成報到</button>`}
    </div>
  `);

  // toggle 行為
  const tog=$("#ckTog");
  if(tog){ tog.onclick=()=>{ cookieGiven=!cookieGiven; tog.classList.toggle("on",cookieGiven);
    const l=$("#ckLbl"); if(l) l.textContent=cookieGiven?"✓ 喜餅已交付":"切換上方開關標記已交付"; }; }
  window.setGift=(a)=>{ $("#giftIn").value=a||""; };
  window.confirmCheckin=(gid)=>{
    const amt=Number($("#giftIn").value)||0;
    const cg=$("#ckTog")?$("#ckTog").classList.contains("on"):!!App.state.guests[gid].cookieGiven;
    App.commit(s=>{
      const gg=s.guests[gid];
      const first=!gg.arrived;
      gg.arrived=true; gg.giftAmount=amt; gg.cookieGiven=cg;
      if(first||!gg.arrivedTime) gg.arrivedTime=Date.now();
    });
    closeSheet(); toast(`✓ ${App.state.guests[gid].name} 報到完成`);
  };
  window.undoCheckin=(gid)=>{
    App.commit(s=>{ const gg=s.guests[gid]; gg.arrived=false; gg.arrivedTime=null; });
    closeSheet(); toast("已取消報到");
  };
}

/* ============================================================
   桌次安排 Seating
   ============================================================ */
let dragGuestId=null;
function viewSeating(){
  const tbls=tableList();
  const unassigned=guestList().filter(g=>!g.table);
  return `
  <h2 class="section-title"><span class="eyebrow">Seating</span> 桌次安排</h2>
  <div class="seat-head">
    <button class="btn btn-primary btn-sm" onclick="openTableEdit()">＋ 新增桌次</button>
    <button class="btn btn-ghost btn-sm" onclick="quickAddTables()">⚡ 快速建桌</button>
  </div>

  <div class="unassigned-pool">
    <div class="pool-title">🎈 待排桌賓客 (${unassigned.length})</div>
    ${unassigned.length?`<div class="pool-chips" ondragover="event.preventDefault()" ondrop="dropToPool(event)">
      ${unassigned.map(g=>`<div class="guest-pill" draggable="true" data-g="${g.id}"
        ondragstart="dragStart(event,'${g.id}')" ondragend="dragEnd(event)" onclick="assignPrompt('${g.id}')">
        ${esc(g.name)}${g.partySize>1?`<span class="ps">${g.partySize}位</span>`:""}</div>`).join("")}
    </div>`:`<div style="font-size:13px;color:var(--muted)">所有賓客都已排桌 🎉</div>`}
  </div>

  ${tbls.length?tbls.map(t=>{
    const at=guestsAtTable(t.id);
    const heads=at.reduce((s,g)=>s+(g.partySize||1),0);
    const full=t.capacity&&heads>=t.capacity;
    return `<div class="seat-table" data-t="${t.id}" ondragover="dragOver(event,this)" ondragleave="this.classList.remove('over')" ondrop="dropToTable(event,'${t.id}')">
      <div class="st-head">
        <span class="tn">${esc(t.name)}</span>
        <span class="cap ${full?'full':''}">${heads}${t.capacity?` / ${t.capacity}`:""} 人</span>
        <button class="icon-btn" style="width:28px;height:28px;background:rgba(255,255,255,.15);border:none;color:#fff" onclick="openTableEdit('${t.id}')">✎</button>
      </div>
      <div class="st-body">
        ${at.length?at.map(g=>`<div class="seat-pill ${g.arrived?'arr':''}">
          ${g.arrived?"✓ ":""}${esc(g.name)}${g.partySize>1?` ·${g.partySize}`:""}
          <span class="x" onclick="unassign('${g.id}')">×</span></div>`).join("")
          :`<span class="st-empty">拖曳賓客到這桌,或點上方賓客選擇桌次</span>`}
      </div>
    </div>`;
  }).join(""):emptyBox("🪑","還沒有桌次","點「新增桌次」或「快速建桌」開始安排座位")}
  `;
}
function bindSeating(){}
function dragStart(e,id){ dragGuestId=id; e.target.classList.add("dragging"); }
function dragEnd(e){ e.target.classList.remove("dragging"); }
function dragOver(e,el){ e.preventDefault(); el.classList.add("over"); }
function dropToTable(e,tid){ e.preventDefault(); document.querySelectorAll(".seat-table").forEach(x=>x.classList.remove("over"));
  if(dragGuestId){ App.commit(s=>{ s.guests[dragGuestId].table=tid; }); dragGuestId=null; } }
function dropToPool(e){ e.preventDefault(); if(dragGuestId){ App.commit(s=>{ s.guests[dragGuestId].table=null; }); dragGuestId=null; } }
function unassign(id){ App.commit(s=>{ s.guests[id].table=null; }); }
function assignPrompt(id){
  const tbls=tableList();
  if(!tbls.length){ toast("請先新增桌次"); return; }

    <div class="note">格式(用逗號分隔,只有姓名也可以):<br><b>姓名, 桌次名稱, 男方/女方, 人數, 喜餅(Y/N)</b><br>
    例如:<br>王大明, 第1桌, 男方, 2, Y<br>陳阿姨, 第3桌, 女方, 1, N<br>李同學</div>
    <textarea class="inp" id="bulkTxt" style="height:170px;margin-top:12px;font-family:ui-monospace,monospace;font-size:14px" placeholder="王大明, 第1桌, 男方, 2, Y&#10;陳阿姨, 第3桌, 女方&#10;李同學"></textarea>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeSheet()">取消</button><button class="btn btn-primary" onclick="doBulkImport()">匯入</button></div>`);

function doBulkImport(){
  const lines=$("#bulkTxt").value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ toast("沒有可匯入的資料"); return; }
  let count=0;
  App.commit(s=>{
    const findTable=(nm)=>{ if(!nm)return null; const f=Object.entries(s.tables).find(([id,t])=>t.name===nm); 
      if(f)return f[0]; const id=uid(); s.tables[id]={name:nm,capacity:null,order:Object.keys(s.tables).length+1,note:""}; return id; };
    lines.forEach(line=>{
      const p=line.split(/[,，]/).map(x=>x.trim());
      const name=p[0]; if(!name)return;
      const table=p[1]?findTable(p[1]):null;
      const side=/男/.test(p[2]||"")?"男方":/女/.test(p[2]||"")?"女方":"共同";
      const partySize=Math.max(1,parseInt(p[3])||1);
      const needsCookie=/^[Yy是要]/.test(p[4]||"");
      s.guests[uid()]={name,side,partySize,relation:"",table,needsCookie,arrived:false,giftAmount:0,cookieGiven:false};
      count++;
    });
  });
  closeSheet(); toast(`已匯入 ${count} 位賓客`);
}
function exportCSV(){
  const gs=guestList();

  let csv="姓名,桌次,男女方,人數,喜餅,已報到,禮金,喜餅已領,報到時間\n";
  gs.forEach(g=>{
    csv+=[g.name,g.table?tableName(g.table):"",g.side||"",g.partySize||1,g.needsCookie?"Y":"N",
      g.arrived?"是":"否",g.giftAmount||0,g.cookieGiven?"是":"否",g.arrivedTime?timeStr(g.arrivedTime):""].map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")+"\n";
  });
  downloadFile("婚禮賓客名單.csv","\uFEFF"+csv,"text/csv");
  toast("已匯出 CSV");
}

function closeProjection(){ const e=$("#projEl"); if(e)e.remove(); if(document.fullscreenElement)document.exitFullscreen().catch(()=>{}); render(); }
function drawProjection(){
  if(lotRolling) return;
  const pool=lotEligible();
  if(!pool.length){ $("#pjSub").textContent="沒有可抽的賓客"; return; }
  lotRolling=true;
  const nameEl=$("#pjName"), subEl=$("#pjSub"), btn=$("#pjBtn");
  btn.textContent="抽獎中…"; nameEl.classList.add("rolling"); subEl.textContent="🎲 抽選中…";
  let ticks=0; const total=30+Math.floor(Math.random()*8);
  const spin=()=>{
    nameEl.textContent=pool[Math.floor(Math.random()*pool.length)].name; ticks++;
    if(ticks<total){ setTimeout(spin,55+ticks*4.5); }
    else{
      const winner=pool[Math.floor(Math.random()*pool.length)];
      nameEl.textContent=winner.name; nameEl.classList.remove("rolling");
      subEl.textContent="🎉 恭喜中獎!"; lastWinnerName=winner.name; btn.textContent="🎲 再抽一位";

      fireConfetti($("#pjCanvas"), $("#projEl"));
      lotRolling=false;
    }
  };
  spin();

function fireConfetti(canvas, parent){
  if(!canvas) return;
  const W=canvas.width=parent.clientWidth, H=canvas.height=parent.clientHeight;
  const ctx=canvas.getContext("2d");
  const cols=["#C2A05C","#E6D5AE","#7E2A3D","#F4E4C1","#fff"];
  const parts=Array.from({length:120},()=>({x:W/2+(Math.random()-.5)*120,y:H*.35,vx:(Math.random()-.5)*11,vy:Math.random()*-13-4,
    s:Math.random()*7+4,c:cols[Math.floor(Math.random()*cols.length)],r:Math.random()*6,vr:(Math.random()-.5)*.4}));
  let f=0;
  (function anim(){
    ctx.clearRect(0,0,W,H); f++;
    parts.forEach(p=>{ p.vy+=.32; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r); ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,1-f/110);
      ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.5); ctx.restore(); });
    if(f<110) requestAnimationFrame(anim); else ctx.clearRect(0,0,W,H);
  })();
}

  </div>

  <div class="card pad set-block">
    <div class="field-lbl" style="margin-top:0">婚宴資訊(顯示於頂端)</div>
    <input class="inp" id="setVenue" value="${esc(App.state.meta.venue||'WEDDING CHECK-IN · 高雄')}" placeholder="例如 高雄晶綺盛宴 台鋁館">
    <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="saveMeta()">更新</button>
  </div>

  <div class="card pad set-block">
    <h3 style="font-size:15px;margin-bottom:6px">資料備份</h3>
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:12px">建議活動前先備份;本機模式換裝置時可用匯出/匯入搬移資料。</div>
    <div class="btn-row" style="margin-top:0">
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="exportJSON()">⬇ 匯出備份</button>
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="$('#importFile').click()">⬆ 匯入備份</button>
    </div>
    <input type="file" id="importFile" accept=".json" class="hidden" onchange="importJSON(event)">
    <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:10px;color:var(--red)" onclick="clearAll()">🗑 清除所有資料</button>
  </div>

  <div class="card pad set-block">
    <h3 style="font-size:15px;margin-bottom:6px">開啟雲端多人連線</h3>
    <div style="font-size:12.5px;color:var(--muted);line-height:1.7">
      要讓<b>多支手機同時報到、新人即時看戰況、抽獎投影同步</b>,需建立免費的 Firebase 即時資料庫,並把設定填入本檔最上方的 <code>FIREBASE_CONFIG</code>:
    </div>
    <div class="code-box">const FIREBASE_CONFIG = {
  apiKey: "...",
  databaseURL:
   "https://你的專案-default-rtdb.firebaseio.com",
  projectId: "..."
};</div>
    <div class="note" style="margin-top:10px">步驟:Firebase Console → 建立專案 → Realtime Database(測試模式)→ 專案設定取得設定值貼上 → 重新整理本頁即顯示「雲端連線」。</div>
  </div>

  <div class="script" style="text-align:center;color:var(--muted);font-size:13px;margin:20px 0 6px;font-style:italic">— 吳宇童 ❤ 劉懷筑 · 2026 —</div>
  `;
}
function saveMeta(){ const v=$("#setVenue").value.trim(); App.commit(s=>{ s.meta.venue=v; }); document.getElementById("hdVenue").textContent=v||"WEDDING CHECK-IN"; toast("已更新"); }
function exportJSON(){ downloadFile(`婚禮報到備份_${new Date().toISOString().slice(0,10)}.json`, JSON.stringify(App.state,null,2),"application/json"); toast("已匯出備份"); }
function importJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result);
    if(!data.guests){ toast("檔案格式不符"); return; }
    if(!confirm("匯入會覆蓋目前所有資料,確定?")) return;
    App.commit(s=>{ s.guests=data.guests||{}; s.tables=data.tables||{}; s.lottery=data.lottery||{winners:[]}; s.meta=data.meta||{}; });
    toast("已匯入備份"); render();
  }catch(err){ toast("讀取失敗"); } };
  r.readAsText(file); e.target.value="";
}
function clearAll(){ if(!confirm("確定清除所有賓客、桌次與抽獎資料?此動作無法復原。")) return;
  if(!confirm("再次確認:真的要全部清除嗎?")) return;
  App.commit(s=>{ s.guests={}; s.tables={}; s.lottery={winners:[]}; }); toast("已清除"); }

/* ============================================================
   共用:彈窗 / segmented / 下載 / 空狀態
   ============================================================ */
function openSheet(html){
  closeSheet();
  modalEl=document.createElement("div");
  modalEl.className="overlay";
  modalEl.innerHTML=`<div class="sheet"><div class="sheet-grab"></div><div class="sheet-pad">${html}</div></div>`;
  modalEl.addEventListener("click",e=>{ if(e.target===modalEl) closeSheet(); });
  document.body.appendChild(modalEl);
}
function closeSheet(){ if(modalEl){ modalEl.remove(); modalEl=null; render(); } }
window.closeSheet=closeSheet;

function segBind(id){
  const seg=document.getElementById(id); if(!seg)return;
  const sel=seg.querySelector(".on"); seg.dataset.sel=sel?sel.dataset.f:"";
  seg.querySelectorAll("button").forEach(b=>{ b.onclick=()=>{ seg.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); seg.dataset.sel=b.dataset.f; }; });
}
function downloadFile(name,content,type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function emptyBox(ic,title,sub){ return `<div class="empty"><div class="e-ic">${ic}</div><div style="font-weight:500;font-size:16px;margin-bottom:4px">${title}</div><div style="font-size:13px">${sub}</div></div>`; }

/* ============================================================
   啟動
   ============================================================ */
(async function(){
  await App.init();
  if(App.state.meta && App.state.meta.venue) document.getElementById("hdVenue").textContent=App.state.meta.venue;
  // 首次使用塞入示範資料,方便立即試玩(僅本機模式且完全空白時)
  if(App.mode==="local" && guestList().length===0 && tableList().length===0){
    App.commit(s=>{
      const t1=uid(),t2=uid(),t3=uid();
      s.tables[t1]={name:"第 1 桌",capacity:10,order:1,note:"主桌"};
      s.tables[t2]={name:"第 2 桌",capacity:10,order:2,note:""};
      s.tables[t3]={name:"第 3 桌",capacity:10,order:3,note:""};
      const demo=[
        ["王大明","男方","大學同學",t1,true,2],["陳怡君","女方","公司同事",t1,false,1],
        ["林志豪","男方","高中死黨",t2,true,1],["張美玲","女方","表姊",t2,true,2],
        ["李俊宏","男方","同事",t3,false,1],["黃淑芬","女方","阿姨",null,true,1],
      ];
      demo.forEach(([name,side,relation,table,needsCookie,partySize])=>{
        s.guests[uid()]={name,side,relation,table,needsCookie,partySize,arrived:false,giftAmount:0,cookieGiven:false};
      });
    });
    toast("已載入示範名單,可自由修改 ✨");
  }
  render();
})();
</script>
</body>
</html>
